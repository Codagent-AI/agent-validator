name: agent-validator
base_branch: main
log_dir: validator_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true

cli:
  default_preference:
    - codex
    - github-copilot
  adapters:
    codex:
      allow_tool_use: false
      thinking_budget: low
    github-copilot:
      allow_tool_use: false
      thinking_budget: low

entry_points:
  - path: "."
    exclude:
      - .validator
      - evals/results
      - openspec
      - skills
      - .claude/skills
    checks:
      - build:
          command: bun run build:local
      - lint:
          command: bunx biome check src
      - typecheck:
          command: bun run typecheck
      - test:
          command: bun test
      - security-code:
          command: semgrep scan --config auto --error src
      - security-deps:
          command: bun audit --audit-level=moderate
      - schema-validate:
          command: bun run src/index.ts validate
    reviews:
      - all-reviewers:
          builtin: all-reviewers
  - path: "skills"
    reviews:
      - skill-quality
  - path: ".claude/skills"
    reviews:
      - skill-quality
