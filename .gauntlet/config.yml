name: agent-gauntlet
base_branch: origin/main
log_dir: gauntlet_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true
cli:
  default_preference:
    - claude
    - codex
    - gemini
  adapters:
    claude:
      allow_tool_use: false
      thinking_budget: high
    codex:
      allow_tool_use: false
      thinking_budget: low
    gemini:
      allow_tool_use: false
      thinking_budget: low
stop_hook:
  enabled: false
  auto_push_pr: true
  auto_fix_pr: true
entry_points:
  - path: "."
    exclude:
      - evals/results
    checks:
      - build
      - lint
      - typecheck
      - test
      - security-code
      - security-deps
      - schema-validate
      - code-health
    reviews:
      - code-quality

  - path: "openspec/changes"
    exclude:
      - "openspec/changes/archive"
    checks:
      - openspec-validate
      - no-orphaned-design-docs
    reviews:
      - change-review
