name: agent-validator
base_branch: main
log_dir: gauntlet_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true
cli:
  default_preference:
    - codex
    - claude
    - gemini
  adapters:
    claude:
      allow_tool_use: false
      thinking_budget: high
    codex:
      allow_tool_use: false
      thinking_budget: low
    gemini:
      allow_tool_use: false
      thinking_budget: low
checks:
  build:
    command: bun run build
  lint:
    command: bunx biome check src
  test:
    command: bun test
  typecheck:
    command: bun run typecheck
  security-code:
    command: semgrep scan --config auto --error src
  security-deps:
    command: bun audit --audit-level=moderate
  schema-validate:
    command: bun run src/index.ts validate
reviews:
  code-quality:
    builtin: code-quality
    num_reviews: 1
entry_points:
  - path: "."
    exclude:
      - .gauntlet
      - evals/results
      - openspec
      - skills
      - .claude/skills
    checks:
      - build
      - lint
      - typecheck
      - test
      - security-code
      - security-deps
      - schema-validate
    reviews:
      - code-quality
      - task-compliance
  - path: "skills"
    reviews:
      - skill-quality
  - path: ".claude/skills"
    reviews:
      - skill-quality

