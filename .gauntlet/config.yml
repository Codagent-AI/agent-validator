name: agent-validator
base_branch: main
log_dir: gauntlet_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true
cli:
  default_preference:
    - codex
    - claude
    - gemini
  adapters:
    claude:
      allow_tool_use: false
      thinking_budget: high
    codex:
      allow_tool_use: false
      thinking_budget: low
    gemini:
      allow_tool_use: false
      thinking_budget: low
checks:
  build:
    command: bun run build
    parallel: true
  lint:
    command: bunx biome check src
    parallel: true
    timeout: 60
  test:
    command: bun test
    parallel: true
  typecheck:
    command: bun run typecheck
    parallel: true
    timeout: 60
  security-code:
    command: semgrep scan --config auto --error src
    parallel: true
    timeout: 180
  security-deps:
    command: bun audit --audit-level=moderate
    parallel: true
    timeout: 120
  schema-validate:
    command: bun run src/index.ts validate
    parallel: true
  openspec-validate:
    command: openspec validate --changes
    parallel: true
    run_in_ci: false
  no-orphaned-design-docs:
    command: bun .gauntlet/scripts/check-no-orphaned-design-docs.ts
    parallel: true
reviews:
  code-quality:
    builtin: code-quality
    num_reviews: 1
entry_points:
  - path: "."
    exclude:
      - .gauntlet
      - evals/results
      - openspec
      - skills
      - .claude/skills
    checks:
      - build
      - lint
      - typecheck
      - test
      - security-code
      - security-deps
      - schema-validate
    reviews:
      - code-quality
      - task-compliance
  - path: "skills"
    reviews:
      - skill-quality
  - path: ".claude/skills"
    reviews:
      - skill-quality
  - path: "openspec/changes"
    exclude:
      - "openspec/changes/archive"
    checks:
      - openspec-validate
    reviews:
      - artifact-review

