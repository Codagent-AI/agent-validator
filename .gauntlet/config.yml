name: agent-gauntlet
base_branch: dev
log_dir: gauntlet_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true
cli:
  default_preference:
    - codex
    - gemini
    - claude # trying to save tokens
  adapters:
    claude:
      allow_tool_use: false
      thinking_budget: high
    codex:
      allow_tool_use: false
      thinking_budget: low
    gemini:
      allow_tool_use: false
      thinking_budget: low
stop_hook:
  enabled: false
  auto_push_pr: true
  auto_fix_pr: true
entry_points:
  - path: "."
    exclude:
      - .gauntlet
      - evals/results
      - openspec
    checks:
      - build
      - lint
      - typecheck
      - test
      - security-code
      - security-deps
      - schema-validate
    reviews:
      - code-quality
      - task-compliance
  - path: "openspec/changes"
    exclude:
      - "openspec/changes/archive"
    checks:
      - openspec-validate
    reviews:
      - artifact-review

