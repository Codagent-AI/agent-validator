name: agent-gauntlet
base_branch: origin/main
log_dir: gauntlet_logs
debug_log:
  enabled: true
  max_size_mb: 10
allow_parallel: true
cli:
  default_preference:
    - claude
    - codex
    - gemini
  adapters:
    claude:
      allow_tool_use: false
      thinking_budget: high
    codex:
      allow_tool_use: false
      thinking_budget: low
    gemini:
      allow_tool_use: false
      thinking_budget: low
stop_hook:
  auto_push_pr: false
  auto_fix_pr: false
entry_points:
  - path: "."
    exclude:
      - evals/results
    reviews:
      - code-quality
  - path: "src"
    checks:
      - build
      - lint
      - typecheck
      - test
      - security-code
      - schema-validate
      - code-health
  - path: "package.json"
    checks:
      - build
      - test
      - security-deps
  - path: "openspec/changes"
    exclude:
      - "openspec/changes/archive"
      - "**/tasks.md" # Prevent triggering review of entire spec when marking tasks as done 
    checks:
      - openspec-validate
    reviews:
      - change-review
  - path: "openspec/changes/*/tasks.md"
    reviews:
      - task-review      
