name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for npm
        run: bun run build:npm

      - name: Check if version is already published
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          NPM_OUTPUT=$(npm view agent-validator@"$LOCAL_VERSION" version 2>&1) && {
            echo "published=true" >> "$GITHUB_OUTPUT"
          } || {
            if echo "$NPM_OUTPUT" | grep -q 'E404'; then
              echo "published=false" >> "$GITHUB_OUTPUT"
            else
              echo "$NPM_OUTPUT" >&2
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: v${{ steps.check.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/Codagent-AI/agent-validator/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve npm tarball metadata
        if: steps.check.outputs.published == 'false'
        id: npm-tarball
        run: |
          VERSION="${{ steps.check.outputs.version }}"

          for attempt in 1 2 3 4 5; do
            TARBALL_URL=$(npm view agent-validator@"$VERSION" dist.tarball 2>/dev/null || true)
            if [ -n "$TARBALL_URL" ]; then
              break
            fi
            echo "agent-validator@$VERSION is not visible in npm yet; retrying ($attempt/5)."
            sleep 10
          done

          if [ -z "$TARBALL_URL" ]; then
            echo "Failed to resolve npm tarball URL for agent-validator@$VERSION." >&2
            exit 1
          fi

          curl -fsSL "$TARBALL_URL" -o agent-validator.tgz
          SHA256=$(sha256sum agent-validator.tgz | awk '{print $1}')

          echo "url=$TARBALL_URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.check.outputs.published == 'false'
        uses: actions/checkout@v4
        with:
          repository: Codagent-AI/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: steps.check.outputs.published == 'false'
        run: bun .github/scripts/homebrew-formula.ts
        env:
          AGENT_VALIDATOR_VERSION: ${{ steps.check.outputs.version }}
          AGENT_VALIDATOR_TARBALL_URL: ${{ steps.npm-tarball.outputs.url }}
          AGENT_VALIDATOR_TARBALL_SHA256: ${{ steps.npm-tarball.outputs.sha256 }}
          HOMEBREW_FORMULA_PATH: homebrew-tap/agent-validator.rb

      - name: Push Homebrew tap update
        if: steps.check.outputs.published == 'false'
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- agent-validator.rb; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-validator.rb
          git commit -m "agent-validator ${{ steps.check.outputs.version }}"
          git push
