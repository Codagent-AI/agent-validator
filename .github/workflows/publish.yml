name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is already published
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          if npm view agent-gauntlet@"$LOCAL_VERSION" version >/dev/null 2>/tmp/npm_view_err; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            if grep -q 'E404' /tmp/npm_view_err; then
              echo "published=false" >> "$GITHUB_OUTPUT"
            else
              cat /tmp/npm_view_err >&2
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: v${{ steps.check.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/pacaplan/agent-gauntlet/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
