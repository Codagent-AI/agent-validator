issues:
  - id: cursor-command-injection
    file: src/cli-adapters/cursor.ts
    line_range:
      - 186
      - 186
    description: Shell command injection vulnerability where resolvedModel is interpolated directly into
      a shell command string passed to exec. If a model ID contains shell metacharacters, arbitrary
      commands can execute. The code builds a command like "cat ... | agent --trust${modelFlag}"
      where modelFlag contains user-controlled input without proper escaping.
    code_snippet: |
      const modelFlag = resolvedModel ? ` --model ${resolvedModel}` : "";
      const cmd = `cat "${tmpFile}" | agent --trust${modelFlag}`;
      const { stdout } = await execAsync(cmd, {
        timeout: opts.timeoutMs,
        maxBuffer: MAX_BUFFER_BYTES,
      });
    category: security
    difficulty: medium
    priority: high
    reviewer: security
    source: 2026-02-16 reviewer-model-resolution.agent-validator
  - id: copilot-command-injection
    file: src/cli-adapters/github-copilot.ts
    line_range:
      - 193
      - 193
    description: Shell command injection vulnerability where resolvedModel is appended unquoted into a
      shell command executed via exec. A malicious or specially-crafted model string can break out
      of the intended arguments and execute arbitrary shell commands. The code uses string
      interpolation to build shell commands with untrusted model values.
    code_snippet: |
      const modelFlag = resolvedModel ? ` --model ${resolvedModel}` : "";
      const cmd = `cat "${tmpFile}" | copilot --allow-tool "shell(cat)" ...${modelFlag}`;
      const { stdout } = await execAsync(cmd, {
        timeout: opts.timeoutMs,
        maxBuffer: MAX_BUFFER_BYTES,
      });
    category: security
    difficulty: medium
    priority: high
    reviewer: security
    source: 2026-02-16 reviewer-model-resolution.agent-validator
  - id: shell-injection-via-exec-async-interpolation
    file: src/core/change-detector.ts
    line_range:
      - 108
      - 109
    description: >
      The getDiffWithWorkingTree method (and several other execAsync calls in the file) interpolates
      a baseRef value directly into a shell command string using a template literal: `git diff
      --name-only ${baseRef}...HEAD`. While isValidGitRef() validates the ref with a regex before
      use, the file still relies on shell=true execution for all these calls. If the regex were ever
      relaxed or bypassed (e.g. via a different code path that skips validation), arbitrary shell
      commands could be injected. More critically, using execAsync (shell=true) for git commands
      that accept user-controlled refs is an inherently unsafe pattern — execFileAsync with argument
      arrays would eliminate the risk entirely without needing regex validation as a guard.
    code_snippet: |
      private async getDiffWithWorkingTree(baseRef: string): Promise<string[]> {
        const { stdout: committed } = await execAsync(
          `git diff --name-only ${baseRef}...HEAD`,
        );
        const files = new Set([
          ...this.parseOutput(committed),
          ...(await this.getWorkingTreeFiles()),
        ]);
        return Array.from(files);
      }
    category: security
    difficulty: medium
    priority: high
    reviewer: security
    source: 2026-02-28 skill-review.agent-validator
  - id: silent-error-swallow-file-enumeration
    file: src/output/report.ts
    line_range:
      - 111
      - 118
    description: >
      Review JSON files that fail to read or parse are silently skipped during violation
      enumeration. This causes --report to omit real review failures and update-review list/fix/skip
      to act as if no pending violations exist, hiding failures in the exact workflow the feature is
      meant to drive.
    code_snippet: |
      for (const file of jsonFiles) {
        try {
          const fileViolations = await collectViolationsFromFile(
            path.join(logDir, file),
            file,
            allViolations.length + 1,
          );
          allViolations.push(...fileViolations);
        } catch {
          // Skip unparseable files
        }
      }
    category: bug
    difficulty: medium
    priority: high
    reviewer: error-handling
    source: 2026-03-15 agent-validator
  - id: blanket-catch-readdir-hides-failures
    file: src/output/report.ts
    line_range:
      - 97
      - 104
    description: >
      fs.readdir(logDir) failures for any reason (permission errors, transient IO failures) are
      caught and return an empty violation list, turning real errors into false "no violations"
      results. Only ENOENT should be treated as empty; other errors should propagate.
    code_snippet: |
      let files: string[];
      try {
        files = await fs.readdir(logDir);
      } catch {
        return [];
      }
    category: bug
    difficulty: medium
    priority: high
    reviewer: error-handling
    source: 2026-03-15 agent-validator
