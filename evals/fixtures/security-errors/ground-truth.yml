issues:
  # --- Security issues in handler.ts ---

  - id: sql-injection
    file: src/api/handler.ts
    line_range: [31, 31]
    description: >
      SQL injection via string concatenation. User-supplied userId is interpolated
      directly into a SQL query string without parameterization or escaping.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: hardcoded-api-key
    file: src/api/handler.ts
    line_range: [132, 132]
    description: >
      Hardcoded live API key (sk-live-...) exposed in source code. The config
      object contains a live API key that will be committed to version control.
      Secrets should be loaded from environment variables or a secrets manager.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: hardcoded-db-password
    file: src/api/handler.ts
    line_range: [134, 134]
    description: >
      Hardcoded database connection string with plaintext credentials
      (admin:password123) exposed in source code. Database credentials should
      be loaded from environment variables or a secrets manager.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: input-validation
    file: src/api/handler.ts
    line_range: [60, 60]
    description: >
      The age field from the request body is passed directly to updateUser without
      type checking or validation. A malicious client could send a non-numeric value,
      negative number, or unreasonable value.
    category: security
    difficulty: medium
    priority: medium
    requires_tool_use: false
    reviewer: security

  - id: sanitize-bypass
    file: src/api/handler.ts
    line_range: [43, 43]
    description: >
      The sanitize() function (in utils/sanitize.ts) strips HTML tags and encodes
      entities but does not normalize unicode before sanitization. Fullwidth angle
      brackets and other unicode lookalikes bypass the tag stripper, then get
      normalized to real angle brackets by downstream systems, enabling XSS.
    category: security
    difficulty: hard
    priority: high
    requires_tool_use: true
    reviewer: security

  - id: auth-bypass
    file: src/api/handler.ts
    line_range: [24, 24]
    description: >
      The checkAuth() function (in api/middleware.ts) only validates session expiry
      but never checks the session's revoked flag. A revoked session will pass
      authentication until it naturally expires, allowing continued access after
      logout or security revocation.
    category: security
    difficulty: hard
    priority: critical
    requires_tool_use: true
    reviewer: security

  # --- Error-handling issues in handler.ts ---

  - id: error-swallow
    file: src/api/handler.ts
    line_range: [77, 79]
    description: >
      The catch block in handleDeleteUser returns HTTP 200 success even when the
      delete operation throws an error. The caller believes the deletion succeeded
      when it may have failed.
    category: bug
    difficulty: medium
    priority: medium
    requires_tool_use: false
    reviewer: error-handling

  # --- Error-handling issues in batch.ts ---

  - id: ts-notification-dispatch-crash
    file: src/api/batch.ts
    line_range: [130, 132]
    description: >
      The notification dispatch handler iterates over notificationListeners
      and calls each listener without a try/catch. If any listener throws an
      exception, the remaining listeners in the array are never called, silently
      dropping notifications for all subsequent subscribers. Each listener
      invocation should be wrapped in a try/catch to isolate failures.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: ts-batch-update-error-masked
    file: src/api/batch.ts
    line_range: [183, 184]
    description: >
      In handleBatchUpdate, the catch block pushes { success: true } for
      updates that actually failed. The caller receives an all-success
      response even when some or all updates threw errors, making it
      impossible to detect or retry failed updates. The catch should push
      { success: false } and include the error reason.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: ts-deactivate-silent-drop
    file: src/api/batch.ts
    line_range: [205, 206]
    description: >
      handleDeactivateUsers catches all exceptions during deactivation and
      silently continues. The response reports the count of deactivated users
      but gives no indication of how many failed or why. If the database is
      down, every deactivation fails silently and the caller receives
      { deactivated: 0, total: N } with no error status or detail.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: ts-migration-error-swallow
    file: src/api/batch.ts
    line_range: [231, 232]
    description: >
      handleDataMigration wraps the entire migration loop in a single
      try/catch that silently swallows any error and returns HTTP 200 with
      a partial count. If the migration fails mid-batch (e.g. on user 3
      of 100), the caller receives { migrated: 3, total: 100 } with a 200
      status, with no indication that an error occurred. A data migration
      endpoint that silently returns success on failure risks data loss
      and inconsistent state.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  # --- Python security issues ---

  - id: py-hardcoded-api-secret
    file: src/batch_processor.py
    line_range: [23, 23]
    description: >
      API_SECRET_KEY is hardcoded in source code. This credential will be
      committed to version control and visible to anyone with repository
      access. Secrets should be loaded from environment variables or a
      secrets manager at runtime.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: py-hardcoded-webhook-token
    file: src/batch_processor.py
    line_range: [24, 24]
    description: >
      WEBHOOK_TOKEN is hardcoded in source code. This credential will be
      committed to version control and visible to anyone with repository
      access. Secrets should be loaded from environment variables or a
      secrets manager at runtime.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: py-sql-injection
    file: src/batch_processor.py
    line_range: [223, 223]
    description: >
      search_users_by_name interpolates the name parameter directly into a SQL
      query using an f-string. An attacker can inject arbitrary SQL by passing a
      crafted name like "'; DROP TABLE users; --". The query should use
      parameterized placeholders instead of string interpolation.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: py-path-traversal
    file: src/batch_processor.py
    line_range: [232, 232]
    description: >
      export_user_report joins a user-controlled filename directly into a file
      path with os.path.join("/var/reports", filename). A filename containing
      "../" sequences (e.g. "../../etc/cron.d/backdoor") can write to arbitrary
      locations outside the reports directory. The filename must be sanitized or
      validated to contain no path separators.
    category: security
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: security

  - id: py-pickle-deserialization
    file: src/batch_processor.py
    line_range: [241, 241]
    description: >
      load_cached_batch uses pickle.load() to deserialize data from a file path.
      Pickle deserialization executes arbitrary code embedded in the serialized
      data. If an attacker can control or tamper with the cache file, they achieve
      remote code execution. Use a safe format like JSON instead of pickle.
    category: security
    difficulty: medium
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: py-command-injection
    file: src/batch_processor.py
    line_range: [247, 251]
    description: >
      run_data_export passes user-controlled table_name and output_dir into
      an f-string shell command executed via subprocess.call with shell=True.
      A malicious table_name like "users; rm -rf /" or output_dir with shell
      metacharacters enables arbitrary command execution. Use subprocess with
      a list of arguments and shell=False, or validate inputs against an
      allowlist of known table names.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  # --- Python error-handling issues ---

  - id: py-bulk-update-error-swallow
    file: src/batch_processor.py
    line_range: [272, 273]
    description: >
      bulk_update_users catches all exceptions during individual updates
      with a bare except/pass. Failed updates are silently skipped with no
      logging or error details. The caller receives a succeeded count but
      has no way to know which records failed or why, making it impossible
      to retry or investigate failures.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: py-fetch-external-empty-on-error
    file: src/batch_processor.py
    line_range: [289, 290]
    description: >
      fetch_external_users catches all exceptions (network errors, JSON
      decode errors, HTTP errors) and returns an empty list. The caller
      cannot distinguish between "the API returned zero users" and "the
      API is unreachable." This hides outages and data sync failures,
      which can cause downstream logic to incorrectly delete or deactivate
      users that appear to no longer exist upstream.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: py-sync-silent-continue
    file: src/batch_processor.py
    line_range: [309, 311]
    description: >
      sync_users_to_remote catches all exceptions per user and continues
      to the next without logging or collecting error details. The return
      value is only a count of synced users — the caller has no way to
      know which users failed, making selective retry impossible. If the
      remote service is down, every push fails silently and the function
      returns 0 with no error.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: py-validate-import-error-miscount
    file: src/batch_processor.py
    line_range: [333, 334]
    description: >
      validate_and_import_users counts database insertion errors as "skipped"
      records rather than "errors". A constraint violation (duplicate email)
      and a missing required field are reported identically. The caller
      cannot distinguish between records that were intentionally skipped due
      to validation and records that failed due to database errors, hiding
      real failures in the skip count.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: py-archive-error-returns-zero
    file: src/batch_processor.py
    line_range: [358, 359]
    description: >
      archive_old_notifications catches all database errors during the
      archive-and-delete operation and returns 0. If the INSERT into the
      archive table succeeds but the DELETE fails, the exception is caught
      without a rollback, leaving duplicate records in both tables. Even
      if both fail, the caller receives 0 with no error, indistinguishable
      from "there were no old notifications to archive."
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  # --- Go security issues ---

  - id: go-ssrf
    file: src/batch_handler.go
    line_range: [329, 329]
    description: >
      FetchUserAvatar takes a user-provided avatarURL and fetches it directly
      with the HTTP client. An attacker can supply internal network URLs
      (e.g. http://169.254.169.254/latest/meta-data/ for cloud metadata,
      or http://localhost:6379/ for internal services) to probe or exfiltrate
      data from the internal network. The URL must be validated against an
      allowlist of permitted domains or schemes.
    category: security
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: security

  - id: go-path-traversal
    file: src/batch_handler.go
    line_range: [340, 340]
    description: >
      ServeJobArtifact reads a filename from the query string and joins it
      directly with filepath.Join("/var/artifacts", filename). filepath.Join
      resolves ".." components, so a filename like "../../etc/passwd" resolves
      to "/etc/passwd", allowing an attacker to read arbitrary files on the
      server. The filename must be validated to ensure it does not escape the
      base directory.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  - id: go-weak-random-token
    file: src/batch_handler.go
    line_range: [354, 354]
    description: >
      GenerateJobID uses math/rand to generate job identifiers. math/rand
      is a deterministic PRNG seeded with a predictable value — an attacker
      who knows the seed or observes a few IDs can predict all future IDs.
      For identifiers that must be unguessable, crypto/rand must be used
      instead.
    category: security
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: security

  - id: go-open-redirect
    file: src/batch_handler.go
    line_range: [367, 368]
    description: >
      HandleLoginCallback reads "return_to" from the query string and passes
      it directly to http.Redirect without validation. An attacker can craft
      a login link with return_to=https://evil.com to redirect users to a
      phishing site after authentication, stealing session tokens or
      credentials. The redirect target must be validated against a list of
      allowed domains or restricted to same-origin paths.
    category: security
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: security

  - id: go-idor-export
    file: src/batch_handler.go
    line_range: [215, 215]
    description: >
      HandleExport reads user_id from the query string and returns all jobs
      for that user without any authentication or authorization check. Any
      unauthenticated caller can export any user's job data by supplying
      their user_id. The handler must authenticate the request and verify
      the caller is authorized to access the requested user's data.
    category: security
    difficulty: easy
    priority: critical
    requires_tool_use: false
    reviewer: security

  # --- Go error-handling issues ---

  - id: go-webhook-error-swallowed
    file: src/batch_handler.go
    line_range: [160, 166]
    description: >
      notifyWebhook silently discards errors at two levels: json.Marshal
      errors are assigned to _ on line 160, and HTTP POST errors cause an
      immediate return with no logging or error propagation on line 163.
      Jobs are marked as completed in executeJob before notifyWebhook is
      called, so if the webhook is unreachable the job appears successful
      but no notification is ever delivered, with no record of the failure.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: go-encode-write-ignored
    file: src/batch_handler.go
    line_range: [113, 113]
    description: >
      json.NewEncoder(w).Encode() can fail (e.g. broken client connection),
      but its error return is ignored in HandleSubmitJobs (line 113),
      HandleGetJob (line 124), and HandleBatchDelete (line 297). If encoding
      fails, the client receives a partial or empty response body with a 200
      status code. At minimum the error should be logged so broken responses
      can be diagnosed.
    category: bug
    difficulty: easy
    priority: medium
    requires_tool_use: false
    reviewer: error-handling

  - id: go-health-check-false-positive
    file: src/batch_handler.go
    line_range: [383, 387]
    description: >
      HandleHealthCheck pings the webhook endpoint and stores the result
      in dbHealthy, but then discards it with _ = dbHealthy and
      unconditionally returns {"status": "healthy"}. The health check
      always reports healthy regardless of whether the dependency is
      reachable, defeating the purpose of the check and hiding outages
      from load balancers and monitoring systems.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: go-cleanup-notification-error-ignored
    file: src/batch_handler.go
    line_range: [404, 410]
    description: >
      CleanupExpiredJobs sends a webhook notification about the cleanup
      but ignores the HTTP response — json.Marshal error is discarded
      with _, the POST error causes an early return (losing the notification
      silently), and on success the response body is assigned to _ and
      never closed, leaking the underlying TCP connection.
    category: bug
    difficulty: medium
    priority: high
    requires_tool_use: false
    reviewer: error-handling

  - id: go-process-all-report-ignored
    file: src/batch_handler.go
    line_range: [431, 433]
    description: >
      ProcessAllUsers sends a summary report to the webhook but discards
      both the json.Marshal error and the entire HTTP response. The POST
      error is completely ignored (not even an early return), and the
      response body is never closed, leaking the connection. If the
      reporting endpoint is critical for audit or billing, failures will
      go unnoticed.
    category: bug
    difficulty: easy
    priority: high
    requires_tool_use: false
    reviewer: error-handling
